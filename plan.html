<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGNL Media — 30 Day Plan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --black: #0a0a0a;
  --white: #f8f6f2;
  --gray-1: #1a1a1a;
  --gray-2: #2a2a2a;
  --gray-3: #444;
  --gray-4: #888;
  --gray-5: #bbb;
  --gray-6: #e8e6e2;
  --serif: 'DM Serif Display', serif;
  --sans: 'Outfit', sans-serif;
}
html { scroll-behavior: smooth; }
body { background: var(--white); color: var(--black); font-family: var(--sans); }

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: var(--white);
  border-bottom: 1px solid var(--gray-6);
  padding: 0 40px;
  height: 60px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-text { font-family: var(--sans); font-size: 13px; font-weight: 700; letter-spacing: 3px; color: var(--black); }
.logo-sub { font-size: 7px; letter-spacing: 5px; color: var(--gray-4); display: block; margin-top: 1px; }
.nav-progress { font-size: 12px; font-weight: 500; color: var(--gray-4); letter-spacing: 1px; }
.nav-progress span { color: var(--black); font-weight: 600; }

/* HEADER */
.header {
  padding: 100px 40px 60px;
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: end;
  gap: 40px;
  border-bottom: 1px solid var(--gray-6);
}
.header-label { font-size: 11px; font-weight: 500; letter-spacing: 4px; color: var(--gray-4); margin-bottom: 12px; text-transform: uppercase; }
.header-title { font-family: var(--serif); font-size: clamp(36px, 5vw, 60px); line-height: 1.1; color: var(--black); }
.header-title em { font-style: italic; color: var(--gray-3); }
.header-stats { display: flex; gap: 32px; }
.hstat { text-align: right; }
.hstat-num { font-family: var(--serif); font-size: 36px; color: var(--black); line-height: 1; }
.hstat-label { font-size: 10px; letter-spacing: 2px; color: var(--gray-4); margin-top: 2px; text-transform: uppercase; }

/* MAIN LAYOUT */
.main { max-width: 1100px; margin: 0 auto; padding: 0 40px 80px; display: grid; grid-template-columns: 260px 1fr; gap: 0; }

/* SIDEBAR */
.sidebar { border-right: 1px solid var(--gray-6); padding: 40px 0; position: sticky; top: 60px; height: calc(100vh - 60px); overflow-y: auto; }
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--gray-6); }
.sidebar-label { font-size: 10px; font-weight: 600; letter-spacing: 3px; color: var(--gray-4); padding: 0 24px; margin-bottom: 12px; text-transform: uppercase; }
.day-link {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 24px; cursor: pointer; transition: background 0.15s;
  font-size: 13px; color: var(--gray-3); font-weight: 400;
  border-left: 2px solid transparent;
}
.day-link:hover { background: var(--gray-6); }
.day-link.active { border-left-color: var(--black); color: var(--black); font-weight: 600; background: rgba(0,0,0,0.03); }
.day-link.complete { color: var(--gray-4); }
.day-link.complete .day-check { opacity: 1; }
.day-check { width: 14px; height: 14px; border: 1px solid var(--gray-5); border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: all 0.2s; flex-shrink: 0; }
.day-check.done { background: var(--black); border-color: var(--black); opacity: 1; }
.day-check.done::after { content: ''; width: 6px; height: 6px; background: var(--white); border-radius: 50%; display: block; }
.sidebar-section-gap { height: 8px; }
.sidebar-week-label { font-size: 9px; font-weight: 600; letter-spacing: 3px; color: var(--gray-5); padding: 12px 24px 4px; text-transform: uppercase; }

/* CONTENT */
.content { padding: 40px 0 40px 48px; }
.day-section { margin-bottom: 64px; scroll-margin-top: 80px; }
.day-header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 4px; }
.day-num { font-size: 10px; font-weight: 600; letter-spacing: 4px; color: var(--gray-4); text-transform: uppercase; }
.day-title { font-family: var(--serif); font-size: 26px; color: var(--black); line-height: 1.2; }
.day-goal { font-size: 13px; color: var(--gray-4); margin-bottom: 24px; font-style: italic; border-left: 2px solid var(--gray-6); padding-left: 12px; margin-top: 8px; }
.tasks { display: flex; flex-direction: column; gap: 1px; }
.task {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 14px 16px;
  border: 1px solid var(--gray-6);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  background: var(--white);
  user-select: none;
}
.task:hover { border-color: var(--gray-5); background: #fafaf8; }
.task.done { background: #f5f5f3; }
.task.done .task-text { color: var(--gray-4); text-decoration: line-through; }
.task.done .task-note { color: var(--gray-5); }
.task-cb {
  width: 18px; height: 18px; border: 1.5px solid var(--gray-5);
  border-radius: 3px; flex-shrink: 0; margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.task.done .task-cb { background: var(--black); border-color: var(--black); }
.task.done .task-cb::after { content: ''; width: 9px; height: 6px; border-left: 1.5px solid var(--white); border-bottom: 1.5px solid var(--white); transform: rotate(-45deg) translateY(-1px); display: block; }
.task-body { flex: 1; }
.task-text { font-size: 14px; font-weight: 400; color: var(--black); line-height: 1.5; }
.task-note { font-size: 12px; color: var(--gray-4); margin-top: 3px; line-height: 1.4; }
.task-tag { display: inline-block; font-size: 9px; font-weight: 600; letter-spacing: 2px; padding: 2px 8px; border-radius: 20px; margin-bottom: 4px; text-transform: uppercase; }
.tag-daily { background: #f0f0ee; color: var(--gray-3); }
.tag-outreach { background: #0a0a0a; color: var(--white); }
.tag-content { background: #e8e4dc; color: var(--gray-2); }
.tag-setup { background: #f8f4ec; color: #7a6a4a; border: 1px solid #e8d8b8; }
.tag-close { background: var(--black); color: var(--white); }

/* PROSPECT LIST */
.prospect-section { margin-top: 32px; border: 1px solid var(--gray-6); }
.prospect-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--gray-6); background: #fafaf8; }
.prospect-title { font-size: 12px; font-weight: 600; letter-spacing: 2px; color: var(--black); text-transform: uppercase; }
.prospect-count { font-size: 11px; color: var(--gray-4); }
.prospect-add { display: flex; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--gray-6); }
.prospect-input {
  flex: 1; padding: 8px 12px; border: 1px solid var(--gray-6); font-family: var(--sans); font-size: 13px; color: var(--black); background: var(--white); outline: none; transition: border-color 0.15s;
}
.prospect-input:focus { border-color: var(--gray-3); }
.prospect-input::placeholder { color: var(--gray-5); }
.prospect-btn {
  padding: 8px 16px; background: var(--black); color: var(--white); border: none; font-family: var(--sans); font-size: 12px; font-weight: 600; letter-spacing: 1px; cursor: pointer; transition: background 0.15s;
}
.prospect-btn:hover { background: var(--gray-1); }
.prospect-select {
  padding: 8px 10px; border: 1px solid var(--gray-6); font-family: var(--sans); font-size: 12px; color: var(--black); background: var(--white); outline: none; cursor: pointer;
}
.prospect-list { max-height: 280px; overflow-y: auto; }
.prospect-row {
  display: flex; align-items: center; gap: 12px; padding: 10px 16px;
  border-bottom: 1px solid var(--gray-6); transition: background 0.15s;
}
.prospect-row:last-child { border-bottom: none; }
.prospect-row:hover { background: #fafaf8; }
.prospect-name { font-size: 13px; font-weight: 500; color: var(--black); flex: 1; }
.prospect-company { font-size: 12px; color: var(--gray-4); width: 120px; }
.prospect-status-badge {
  font-size: 9px; font-weight: 600; letter-spacing: 1.5px; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; white-space: nowrap;
}
.ps-connected { background: #f0f0ee; color: var(--gray-3); }
.ps-replied { background: #e8f4ec; color: #2a6a3a; }
.ps-call { background: #fef4e4; color: #8a6010; }
.ps-proposal { background: #e8ecf8; color: #2a3a8a; }
.ps-closed { background: var(--black); color: var(--white); }
.prospect-status-sel {
  font-size: 11px; padding: 4px 8px; border: 1px solid var(--gray-6); font-family: var(--sans); background: var(--white); color: var(--black); cursor: pointer; outline: none;
}
.prospect-del { font-size: 11px; color: var(--gray-5); cursor: pointer; padding: 4px; transition: color 0.15s; border: none; background: none; font-family: var(--sans); }
.prospect-del:hover { color: var(--black); }
.prospect-empty { padding: 24px 16px; font-size: 13px; color: var(--gray-4); text-align: center; font-style: italic; }

/* RECURRING BOX */
.recurring-box { border: 1px solid var(--gray-6); margin-top: 32px; }
.recurring-header { padding: 12px 16px; border-bottom: 1px solid var(--gray-6); background: #fafaf8; font-size: 11px; font-weight: 600; letter-spacing: 3px; color: var(--gray-3); text-transform: uppercase; }
.recurring-grid { display: grid; grid-template-columns: repeat(3, 1fr); }
.recurring-item { padding: 16px; border-right: 1px solid var(--gray-6); border-bottom: 1px solid var(--gray-6); }
.recurring-item:nth-child(3n) { border-right: none; }
.recurring-item:nth-last-child(-n+3) { border-bottom: none; }
.recurring-num { font-family: var(--serif); font-size: 28px; color: var(--black); line-height: 1; }
.recurring-label { font-size: 11px; color: var(--gray-4); margin-top: 2px; }

/* PROGRESS BAR */
.progress-wrap { padding: 0 40px; max-width: 1100px; margin: 0 auto; padding-top: 20px; }
.progress-track { height: 2px; background: var(--gray-6); width: 100%; }
.progress-fill { height: 100%; background: var(--black); transition: width 0.4s ease; }
.progress-labels { display: flex; justify-content: space-between; margin-top: 6px; font-size: 11px; color: var(--gray-4); }

/* MOBILE */
@media (max-width: 768px) {
  nav, .header, .progress-wrap { padding-left: 20px; padding-right: 20px; }
  .header { grid-template-columns: 1fr; padding-top: 80px; }
  .header-stats { justify-content: flex-start; }
  .main { grid-template-columns: 1fr; padding: 0 20px 60px; }
  .sidebar { display: none; }
  .content { padding: 32px 0; }
  .recurring-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>

const TAGS = { setup: 'Setup', daily: 'Daily', outreach: 'Outreach', content: 'Content', close: 'Close' };
const TAG_CLASSES = { setup: 'tag-setup', daily: 'tag-daily', outreach: 'tag-outreach', content: 'tag-content', close: 'tag-close' };

let state = JSON.parse(localStorage.getItem('signl-plan') || '{}');
let prospects = JSON.parse(localStorage.getItem('signl-prospects') || '[]');

function saveState() { localStorage.setItem('signl-plan', JSON.stringify(state)); }
function saveProspects() { localStorage.setItem('signl-prospects', JSON.stringify(prospects)); }

function toggleTask(dayIdx, taskIdx) {
  const key = `${dayIdx}-${taskIdx}`;
  state[key] = !state[key];
  saveState();
  renderAll();
}

function addProspect() {
  const name = document.getElementById('p-name').value.trim();
  const company = document.getElementById('p-company').value.trim();
  const status = document.getElementById('p-status').value;
  if (!name) return;
  prospects.push({ id: Date.now(), name, company, status });
  document.getElementById('p-name').value = '';
  document.getElementById('p-company').value = '';
  saveProspects();
  renderProspects();
  updateStats();
}

function updateProspectStatus(id, val) {
  const p = prospects.find(p => p.id === id);
  if (p) { p.status = val; saveProspects(); renderProspects(); updateStats(); }
}

function deleteProspect(id) {
  prospects = prospects.filter(p => p.id !== id);
  saveProspects();
  renderProspects();
  updateStats();
}

const STATUS_LABELS = { connected: 'Connected', replied: 'Replied', call: 'Call booked', proposal: 'Proposal sent', closed: 'Closed' };
const STATUS_CLASSES = { connected: 'ps-connected', replied: 'ps-replied', call: 'ps-call', proposal: 'ps-proposal', closed: 'ps-closed' };

function renderProspects() {
  const list = document.getElementById('prospect-list');
  if (!list) return;
  if (prospects.length === 0) {
    list.innerHTML = '<div class="prospect-empty">No prospects yet. Add your first one above.</div>';
  } else {
    list.innerHTML = prospects.map(p => `
      <div class="prospect-row">
        <div class="prospect-name">${p.name}</div>
        <div class="prospect-company">${p.company || ''}</div>
        <select class="prospect-status-sel" onchange="updateProspectStatus(${p.id}, this.value)">
          ${Object.entries(STATUS_LABELS).map(([v,l]) => `<option value="${v}" ${p.status===v?'selected':''}>${l}</option>`).join('')}
        </select>
        <button class="prospect-del" onclick="deleteProspect(${p.id})">Remove</button>
      </div>
    `).join('');
  }
  document.getElementById('prospect-count').textContent = prospects.length + ' prospects';
}

function updateStats() {
  let done = 0, total = 0;
  DAYS.forEach((d, di) => {
    d.tasks.forEach((t, ti) => {
      total++;
      if (state[`${di}-${ti}`]) done++;
    });
  });
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('nav-done').textContent = done;
  document.getElementById('nav-total').textContent = total;
  document.getElementById('h-done').textContent = done;
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('h-prospects').textContent = prospects.length;
  document.getElementById('h-closed').textContent = prospects.filter(p => p.status === 'closed').length;

  // Update sidebar day checks
  DAYS.forEach((d, di) => {
    const allDone = d.tasks.every((t, ti) => state[`${di}-${ti}`]);
    const check = document.getElementById(`check-${di}`);
    const link = document.getElementById(`link-${di}`);
    if (check) check.className = 'day-check' + (allDone ? ' done' : '');
    if (link) link.className = 'day-link' + (allDone ? ' complete' : '');
  });
}

function renderAll() {
  updateStats();
}

function buildSidebar() {
  const container = document.getElementById('sidebar-links');
  let html = '';
  const weeks = [[0,6],[7,13],[14,20],[21,29]];
  const weekLabels = ['Week 2 — Outreach', 'Week 3 — Calls', 'Week 4 — Close'];
  let weekIdx = 0;
  DAYS.forEach((d, di) => {
    if (di === 7 || di === 14 || di === 21) {
      html += `<div class="sidebar-week-label">${weekLabels[weekIdx]}</div>`;
      weekIdx++;
    }
    html += `<div class="day-link" id="link-${di}" onclick="scrollToDay(${di})">
      <span>Day ${d.day} — ${d.title.split(' ').slice(0,2).join(' ')}</span>
      <div class="day-check" id="check-${di}"></div>
    </div>`;
  });
  container.innerHTML = html;
}

function scrollToDay(di) {
  const el = document.getElementById(`day-${di}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function buildContent() {
  const container = document.getElementById('content');
  let html = '';
  DAYS.forEach((d, di) => {
    const isProspectDay = [1, 3, 7, 11, 15, 21].includes(di);
    const isRecurringDay = di === 2;

    html += `<div class="day-section" id="day-${di}">
      <div class="day-header">
        <span class="day-num">Day ${d.day}</span>
      </div>
      <div class="day-title">${d.title}</div>
      <div class="day-goal">${d.goal}</div>
      <div class="tasks">`;

    d.tasks.forEach((t, ti) => {
      const done = state[`${di}-${ti}`] ? ' done' : '';
      html += `<div class="task${done}" onclick="toggleTask(${di},${ti})">
        <div class="task-cb"></div>
        <div class="task-body">
          <div class="task-tag ${TAG_CLASSES[t.tag]}">${TAGS[t.tag]}</div>
          <div class="task-text">${t.text}</div>
          ${t.note ? `<div class="task-note">${t.note}</div>` : ''}
        </div>
      </div>`;
    });

    html += '</div>';

    if (isRecurringDay) {
      html += `<div class="recurring-box">
        <div class="recurring-header">Daily recurring targets — every single day</div>
        <div class="recurring-grid">
          <div class="recurring-item"><div class="recurring-num">20</div><div class="recurring-label">Connection requests</div></div>
          <div class="recurring-item"><div class="recurring-num">10</div><div class="recurring-label">Comments on posts</div></div>
          <div class="recurring-item"><div class="recurring-num">1</div><div class="recurring-label">Post published (5x/week)</div></div>
          <div class="recurring-item"><div class="recurring-num">5</div><div class="recurring-label">DMs sent (from day 8)</div></div>
          <div class="recurring-item"><div class="recurring-num">100%</div><div class="recurring-label">Reply to your comments</div></div>
          <div class="recurring-item"><div class="recurring-num">1</div><div class="recurring-label">Screenshot analytics</div></div>
        </div>
      </div>`;
    }

    if (isProspectDay) {
      html += `<div class="prospect-section">
        <div class="prospect-header">
          <span class="prospect-title">Prospect tracker</span>
          <span class="prospect-count" id="prospect-count">0 prospects</span>
        </div>
        <div class="prospect-add">
          <input class="prospect-input" id="p-name" placeholder="Name" style="max-width:160px">
          <input class="prospect-input" id="p-company" placeholder="Agency" style="max-width:160px">
          <select class="prospect-select" id="p-status">
            <option value="connected">Connected</option>
            <option value="replied">Replied</option>
            <option value="call">Call booked</option>
            <option value="proposal">Proposal sent</option>
            <option value="closed">Closed</option>
          </select>
          <button class="prospect-btn" onclick="addProspect()">Add</button>
        </div>
        <div class="prospect-list" id="prospect-list"></div>
      </div>`;
    }

    html += '</div>';
  });

  container.innerHTML = html;
  renderProspects();
}

buildSidebar();
buildContent();
updateStats();
</script>
